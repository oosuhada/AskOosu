name: askoosu-orbstack

services:
  app:
    container_name: askoosu-app
    build:
      context: ../..
      dockerfile: Dockerfile
    image: askoosu-app:prod
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://oosu.dev}
    ports:
      - '127.0.0.1:3010:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  postgres:
    container_name: askoosu-postgres
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - ../../.env.production
    ports:
      - '127.0.0.1:${ASKOOSU_POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - askoosu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

volumes:
  askoosu-postgres-data:
